name: Docker Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # --- Read config JSON and export to environment variables ---
      - name: Load Docker config
        id: load_config
        run: |
          echo "FLUTTER_VERSION=$(jq -r '.flutter_version' docker-config.json)" >> $GITHUB_ENV
          echo "OPENJDK_VERSION=$(jq -r '.openjdk_version' docker-config.json)" >> $GITHUB_ENV
          echo "BUILD_TOOLS_VERSION=$(jq -r '.build_tools_version' docker-config.json)" >> $GITHUB_ENV
          echo "ANDROID_PLATFORM=$(jq -r '.android_platform' docker-config.json)" >> $GITHUB_ENV
          echo "CMAKE_VERSION=$(jq -r '.cmake_version' docker-config.json)" >> $GITHUB_ENV
          echo "NDK_VERSION=$(jq -r '.ndk_version' docker-config.json)" >> $GITHUB_ENV
          echo "DOCKER_TAG=$(jq -r '.docker_tag' docker-config.json)" >> $GITHUB_ENV

      # --- Login to GHCR ---
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # --- Build and push Docker image to GHCR ---
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/flutter-fastlane:${{ env.DOCKER_TAG }}
          build-args: |
            FLUTTER_VERSION=${{ env.FLUTTER_VERSION }}
            OPENJDK_VERSION=${{ env.OPENJDK_VERSION }}
            BUILD_TOOLS_VERSION=${{ env.BUILD_TOOLS_VERSION }}
            ANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            NDK_VERSION=${{ env.NDK_VERSION }}
